- name: update apt cache
  apt:
    update_cache: yes
  become: true

- name: Upgrade all packages
  apt:
    upgrade: dist

- name: install base packages
  apt:
    name:
      - curl
      - ca-certificates
      - git
      - nano
      - htop
      - zip
    state: present
  become: true

- name: create user automation
  user:
    name: simon
    shell: /bin/bash
    groups: sudo
    state: present
  become: true