- name: Check if docker is installed
  stat:
    path: /usr/bin/docker
  register: docker_binary

- name: Install dependencies
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  when: docker_enabled | default(false) and not docker_binary.stat.exists
  become: true

- name: Create keyring directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  when: docker_enabled | default(false) and not docker_binary.stat.exists
  become: true

- name: Add docker gpg key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  when: docker_enabled | default(false) and not docker_binary.stat.exists
  become: true

- name: Add docker repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
    state: present
  when: docker_enabled | default(false) and not docker_binary.stat.exists
  become: true

- name: Install docker engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true
  when: docker_enabled | default(false) and not docker_binary.stat.exists
  become: true

- name: Ensure docker service running
  service:
    name: docker
    state: started
    enabled: true
  when: docker_enabled | default(false)
  become: true

- name: Add localadmin to docker group
  user:
    name: localadmin
    groups: docker
    append: true
  when: docker_enabled | default(false)
  become: true

- import_tasks: daemon.yml
  when: docker_enabled | default(false)