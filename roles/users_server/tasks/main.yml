- name: Ensure localadmin user exists
  user:
    name: localadmin
    shell: /bin/bash
    groups: sudo
    append: yes
    create_home: yes
    state: present
  become: true

- name: Ensure .ssh directory exists
  file:
    path: /home/localadmin/.ssh
    state: directory
    owner: localadmin
    group: localadmin
    mode: '0700'
  become: true

- name: Install SSH public key for localadmin
  copy:
    src: id_ed25519.pub
    dest: /home/localadmin/.ssh/authorized_keys
    owner: localadmin
    group: localadmin
    mode: '0600'
  become: true

- name: Allow passwordless sudo for localadmin
  copy:
    dest: /etc/sudoers.d/localadmin
    content: "localadmin ALL=(ALL) NOPASSWD:ALL"
    mode: '0440'
  become: true
